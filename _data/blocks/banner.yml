# ------------------------------------------------------------------------------
# Description
#
description:

  title:                                Banner
  scope:                                User settings
  location:                             _data/blocks/banner.yml

# ------------------------------------------------------------------------------
# SETTINGS
#
settings:

  filters:
    grayscale:                          0
    contrast:                           1
    brightness:                         1

  # ----------------------------------------------------------------------------
  # DIVIDER banner
  #
  #   Adds a (dotted) line as a simple divider between sections.
  #
  # ----------------------------------------------------------------------------
  #
  divider:
    # --------------------------------------------------------------------------
    # DIVIDER properties
    #
    - name:                             Divider Banner 1
      banner:
        enabled:                        true

        id:                             banner_divider_1
        comment:                        Divider Banner 1
        type:                           divider

    - name:                             Divider Banner 2
      banner:
        enabled:                        true

        id:                             banner_divider_2
        comment:                        Divider Banner 2
        type:                           divider


  # ----------------------------------------------------------------------------
  # TEASER banner
  #
  #   A simple intro element for a page. Use it to give visitors a short
  #   overview of what the page is about.
  #
  # ----------------------------------------------------------------------------
  #
  teaser:
    # --------------------------------------------------------------------------
    # HOME Teaser Banner
    #
    - name:                             Home Teaser Banner
      banner:
        enabled:                        true

        id:                             banner_home_teaser
        comment:                        Top teaser shown on home page
        type:                           teaser
        badges:                         false
        icon_family:                    mdib
        properties:                     mb-5

        cards:

          - name:                       Teaser Content
            card:
              enabled:                  true
              width:                    12
              type:                     text
              position:                 left                                    # left | center
              title:                    Jekyll and J1 Template
              tagline:                  <b>Build fast, secure, and powerful modern websites</b>
              translate_description:    notranslate                             # translate|notranslate
              description_properties:   mt-3 mb-3
              description: >
                                        <p class="dropcap">
                                          Jekyll is a tool that builds <b>static websites</b>. That means
                                          it turns simple text files into ready-to-use HTML pages, so you
                                          do not need a database or any complex server software.
                                          You write your content in <b>simple text</b> formats such as
                                          Markdown, AsciiDoc, or plain HTML. Jekyll then uses a template
                                          system called <b>Liquid</b> to turn that text into finished
                                          web pages.
                                          <br><br>
                                          Because the pages are already built, you can put them on any
                                          standard web server. Jekyll works well for personal sites,
                                          project pages, documentation, and blogs. It is also a great
                                          choice for <b>team projects</b>, since you can manage every
                                          version of your site with tools like GitHub.
                                        </p>
                                        <p>
                                          Jekyll One is a complete theme and template system for Jekyll.
                                          It is designed to help you create modern, responsive websites
                                          with a clean look. The theme focuses on usability and
                                          accessibility. It also includes built-in support for search
                                          engine optimisation (SEO) and social media, so your site is
                                          ready to share from day one.
                                          It is <b>free to use</b> for both <b>personal</b> and
                                          <b>business</b> projects.
                                        </p>
                                        <p class="fw-bold d-flex justify-content-center flex-wrap mt-4" style="font-size: 1.5rem">
                                          The most complete free Bootstrap V5 theme for Jekyll
                                        </p>
              buttons:

                - name:                 Roundtrip
                  button:
                    enabled:            true
                    id:                 roundtrip
                    translate:          notranslate                             # translate|notranslate
                    title:              Roundtrip
                    tagline:            see the top features
                    class:              btn btn-raised btn-xl btn-primary text-uppercase text-left mr-2 mb-2
                    style:              "min-width: 270px"
                    icon:               briefcase-search-outline
                    icon_color:
                    icon_size:          3x
                    href:               /pages/public/tour/image_data/
                    target:

                - name:                 Rocketstart
                  button:
                    enabled:            true
                    id:                 rocketstart
                    translate:          notranslate                             # translate|notranslate
                    title:              Rocketstart
                    tagline:            ready in minutes
                    class:              btn btn-raised btn-xl btn-primary text-uppercase text-left mr-2 mb-2
                    style:              "min-width: 270px"
                    icon:               rocket-launch
                    icon_color:
                    icon_size:          3x
                    href:               https://jekyll.one/pages/public/learn/rocketstart/
                    target:             blank

                - name:                 Download
                  button:
                    enabled:            true
                    id:                 download
                    translate:          notranslate                             # translate|notranslate
                    title:              Download
                    tagline:            get it on rubygems
                    class:              btn btn-raised btn-xl btn-primary text-uppercase text-left mr-2 mb-2
                    style:              "min-width: 270px"
                    icon:               briefcase-download-outline
                    icon_color:
                    icon_size:          3x
                    href:               https://rubygems.org/gems/j1-template
                    target:             blank

  # ----------------------------------------------------------------------------
  # PARALLAX banner
  #
  #   Shows a full-width image with a parallax (scrolling) effect. You can
  #   also place a quote in the centre, on top of the image.
  #
  # ----------------------------------------------------------------------------
  #
  parallax:
    # --------------------------------------------------------------------------
    # home_parallax_banner
    #
    - name:                             Home Parallax Banner
      banner:
        enabled:                        true

        id:                             banner_home_parallax
        comment:                        Main parallax banner shown on home page
        type:                           parallax
        properties:

        cards:

          - name:                       Quote settings
            card:
              enabled:                  true
              type:                     quote
#             cite:                     J1 Team
              cite_text_size:           300%
              cite_text_quotes:         false
              cite_text: >
                                        <strong>
                                          <span class="text-primary">Making is</span>
                                          <span class="text-light">like Wanting, <br> but even</span>
                                          <span class="text-primary">Better</span>
                                        </strong>

              text_color:               var(--md-gray-300)
              gridify:                  true
              size_y:                   450
              darken:                   6
              background_image:         /assets/image/module/attic/1920x1280/ideas-start-here-1920x1280.jpg


  # ----------------------------------------------------------------------------
  # IMAGE banner
  #
  #   Shows a full-width image.
  #
  # ----------------------------------------------------------------------------
  #
  image:
    # --------------------------------------------------------------------------
    # home_image_banner
    #
    - name:                             Home Image Banner
      banner:
        enabled:                        true

        id:                             banner_home_image
        comment:                        Image banner shown on home page
        type:                           image
        properties:                     mt-6 mb-6

        image:
          gridify:                      false
          height:                       450
          justify:                      true
          brightness:                   80
          opacity:                      false
          picture:                      /assets/image/module/attic/1920x1280/ideas-start-here-1920x1280.jpg

# ------------------------------------------------------------------------------
# END config
