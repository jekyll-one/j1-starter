# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                CookieConsent
  scope:                                User settings
  location:                             _data/modules/cookieconsent.yml

# ------------------------------------------------------------------------------
# User configuration settings
#
settings:

  postSelectionCallback:                j1.adapter.cookieConsent.cbCookie       # called after the user has made his selection

  # claude - pass options to postSelectionCallback callback function
  # ----------------------------------------------------------------------------
  reloadPageOnChange:                   true                                    # reload current page if user settings has been changed
  expireCookiesOnRequiredOnly:          true

  # ----------------------------------------------------------------------------
  # GENERAL options
  # ----------------------------------------------------------------------------
  #
  enabled:                              true
  show_cookie_icon:                     true

# ------------------------------------------------------------------------------
# END config