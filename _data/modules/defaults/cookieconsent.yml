#
# All configurable text for the consent modal has been consolidated into
# this defaults file. Previously, the button labels, section headings,
# and per-category descriptions were hardcoded as `| default:` fallbacks
# inside the cookieconsent.html Liquid template (and would only become
# configurable if a site-level override under `modules.cookieconsent.labels`
# was published). They now live under `modal_settings.labels` here, so
# they:
#
#   1. participate in the standard defaults/settings merge chain
#      (defaults <- site overrides), giving full i18n with no template
#      edits required;
#   2. travel to the client via the adapter's `cookieConsentOptions`
#      object (i.e. directly in the JS bundle) rather than through a
#      separate XHR fetch of /assets/data/cookieconsent.
#
# Descriptions for the three consent categories are now proper YAML
# arrays. The old "pipe-separated string" representation, only needed
# because Liquid's `default:` filter could not carry list literals, is
# gone.
#
# claude - improve cookieConsent code using lit #2
# ------------------------------------------------------------------------------
# Legacy XHR scaffolding removed. The Lit component cookieConsent.mjs
# now receives its localized text directly from the adapter via the
# `content` constructor property, so the following defaults — which
# only existed to support the old XHR-based content-loading path —# have been deleted from this file:
#
#   - contentURL        (/assets/data/cookieconsent endpoint)
#   - xhrDataElement    (consent-data wrapper inside the fetched HTML)
#   - dialogContainerID (placeholder host element for the injected modal)
#
# Action item for the site: the Liquid template that emitted the JSON
# payload at /assets/data/cookieconsent (cookieconsent.html in the
# pages/_data tree) is no longer referenced by anything and should be
# deleted from the source tree to keep the deployment clean.
#
# The `buttonDoNothing` label default has been updated from
# "Do Nothing" to "Show Privacy Notice" because the corresponding button in the
# modal footer was repurposed to toggle the Privacy Notice section.
# The YAML key name is deliberately unchanged so existing site-level
# translation overrides keyed on `buttonDoNothing` continue to work.
#
# claude - improve cookieConsent code using lit #3
# ------------------------------------------------------------------------------
# Added a companion `buttonHidePrivacyNotice` label default. The
# "Show Privacy Notice" button in the modal footer is now a true
# toggle: while the Privacy Notice section is collapsed the label
# reads "Show Privacy Notice", and while it is expanded the label
# reads "Hide Privacy Notice". The component (cookieConsent.mjs)
# picks between the two label keys at render time based on its
# `_showPrivacy` reactive state. Either key is independently
# overridable from site config for i18n.
#
# claude - improve cookieConsent code using lit #4
# ------------------------------------------------------------------------------
# Added two new label defaults for the footer Settings toggle:
#
#   buttonShowSettings:   "Show Settings"
#   buttonHideSettings:   "Hide Settings"
#
# Background: the previous version exposed the detailed options
# section via a small floated `<a>My Settings</a>` link inside the
# modal body. That link has been removed from cookieConsent.mjs and
# replaced with a true toggle button placed in the modal footer,
# immediately to the right of the existing `buttonShowPrivacyNotice`
# toggle. The new button:
#
#   - reads "Show Settings" while the options section is collapsed
#     (`_detailed === false`),
#   - reads "Hide Settings" while it is expanded
#     (`_detailed === true`),
#   - is wired to the same `_toggleOptions` handler that the inline
#     anchor used, so cookie/persistence semantics are unchanged.
#
# Both label keys are independently overridable from
# `modules.cookieconsent.settings.modal_settings.labels` for full
# i18n, with no template edits required. Each falls back to its
# English literal at render time if the key is absent from a
# partial site-level override.
#
# The pre-existing `mySettings` label ("My Settings") is RETAINED:
# the component still uses it as the heading of the expanded
# options section ("<b>My Settings</b>" rendered above the three
# category switches). Only the inline link that bore that label
# has been removed.
#
# ------------------------------------------------------------------------------

# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                CookieConsent
  scope:                                Default settings
  location:                             _data/modules/defaults/cookieconsent.yml

# ------------------------------------------------------------------------------
# Default settings
#
defaults:

  # ----------------------------------------------------------------------------
  # GENERAL options
  # ----------------------------------------------------------------------------
  #
  enabled:                              false

  showCookieIcon:                       false
  expireCookiesOnRequiredOnly:          true

  reloadPageOnChange:                   true
  autoShowDialog:                       true                                    # show consent dialog if NO consent cookie found

  # `contentURL`, `xhrDataElement`, and `dialogContainerID` used to
  # sit here as defaults for the XHR-based content-loading path. They
  # have been removed; cookieConsent.mjs no longer reads any of them
  # and the /assets/data/cookieconsent endpoint is obsolete (the
  # source template that emitted it should be deleted from the site).
  #
  whitelisted:                          []                                      # pages NO consent issued
  postSelectionCallback:                j1.adapter.cookieConsent.cbCookie       # called after the user has made his selection

  modal_settings:
    title:                              Your Privacy

    body_text: >
                                        This website uses cookies and similar technologies
                                        that are required for operation. You are free to decide
                                        to give, refuse, or withdraw your consent at any time by
                                        clicking the <b>My Settings</b> button.
                                        Changes can be made at any time by clicking the cookie icon
                                        in the menu bar. Additional cookies are used only with your
                                        consent.
                                        Additional cookies are used to analyze how this website is
                                        used or to store your personal settings. Personal settings
                                        allow all visitors to save their preferences for using the
                                        services.
                                        For more information about what data is collected and shared
                                        with partners, please refer to the <b>Privacy Notice</b>.
                                        <br><br>
                                        To visit this website, your consent to cookies is required
                                        by clicking the <b>I Agree</b> button.
    privacy_notice: >
                                        The operator of this website takes the protection of your personal
                                        data seriously. We treat your data confidentially and comply with
                                        the General Data Protection Regulation (GDPR) of the European Union
                                        to protect your privacy.
                                        A set of data is stored in persistent cookies and remains on your
                                        computer for later use. Our partners and we make use of persistent
                                        cookies. Those additional cookies are only used with your consent.
                                        <br><br>
                                        <ul>
                                          <li style="list-style-type: none;">
                                            <b>Necessary</b>
                                            <p>
                                              This website is built on static content, and no database is
                                              used. All information (data) needed to control this site is
                                              stored in so-called session Cookies. Your browser automatically
                                              removes all session cookies when you close all windows.
                                            </p>
                                          </li>
                                          <li style="list-style-type: none;">
                                            <b>Analysis</b>
                                            <p>
                                              Analysis of this website's usage helps optimize its pages to
                                              improve visitors' experience. For traffic analysis, the service
                                              Google Analytics (GA) is used. GA uses persistent cookies that
                                              remain on your computer for its service. This website does
                                              <b>not</b> transfer any personal data to GA. Implicit personal
                                              information, like IP addresses, is anonymized to protect your
                                              privacy.
                                            </p>
                                          </li>
                                          <li style="list-style-type: none;">
                                            <b>Personalization</b>
                                            <p>
                                              Remembering your personal settings enables additional services,
                                              such as theme translation, comments, and running advertising
                                              campaigns, so visitors can use the website free of charge. Partners
                                              use persistent cookies that remain on your computer for their services.
                                              Our partners, such as Bootswatch, Hyvor, Disqus, and Google, provide
                                              excellent, personalized services and help fund the operation of
                                              this site.
                                            </p>
                                          </li>
                                        </ul>

    # Localized text strings (button labels, section headings, and the
    # per-category descriptions) for the consent modal. To translate the
    # modal, override any of these keys under
    # `modules.cookieconsent.settings.modal_settings.labels` in the
    # site-level configuration; missing keys fall back to the defaults
    # below.
    #
    # The `*Desc` keys are YAML lists; each list item renders as a
    # separate `<li>` under the corresponding switch.
    #
    labels:
      privacyNotice:                    Privacy Notice
      mySettings:                       Current settings

      necessary:                        Necessary
      necessaryDesc:
        -                               Required to run the website

      analysis:                         Analysis
      analysisDesc:
        -                               Usage monitoring for this site
        -                               Optimizing of the performance for this site
        -                               Optimizing of content for all visitors

      personalization:                  Personalization
      personalizationDesc:
        -                               Enable Translation services
        -                               Enable Advertising services
        -                               Storage of personal preferences from previous visits
        -                               Enable Comment services to exchange visitor's experiences

      buttonDoNotAgree:                 I Do not Agree

      # Renamed from "Do Nothing" to "Show Privacy Notice". The button in the
      # modal footer no longer just closes the dialog without action;
      # it now toggles the Privacy Notice section. The YAML key is
      # kept as `buttonDoNothing` so existing site-level translation
      # overrides keep working without an additional rename.
      #
      # The button is a true toggle: cookieConsent.mjs swaps the label
      # at render time based on the `_showPrivacy` reactive state.
      # `buttonShowPrivacyNotice` is rendered while the Privacy Notice
      # section is collapsed; `buttonHidePrivacyNotice` is rendered while
      # it is expanded. Both keys are independently overridable in
      # `modules.cookieconsent.settings.modal_settings.labels` for full
      # i18n with no template edits.
      #
      buttonShowPrivacyNotice:          Show Privacy Notice
      buttonHidePrivacyNotice:          Hide Privacy Notice

      # Companion label pair for the new footer Settings toggle.
      # The Lit component (cookieConsent.mjs) selects between the
      # two keys at render time based on its `_detailed` reactive
      # state, exactly as it does for the Privacy toggle above:
      #
      #   _detailed === false  →  buttonShowSettings  ("Show Settings")
      #   _detailed === true   →  buttonHideSettings  ("Hide Settings")
      #
      # The button replaces the previous inline "My Settings" link
      # that lived in the modal body. The `mySettings` label key
      # (further up in this block) is RETAINED and is still used as
      # the section heading inside the expanded options block; only
      # the inline link that bore that label has been removed.
      # Either key below is independently overridable from
      # `modules.cookieconsent.settings.modal_settings.labels` for
      # i18n.
      #
      buttonShowSettings:               Show Settings
      buttonHideSettings:               Hide Settings

      buttonAgree:                      I Agree
      buttonSave:                       Save selection
      buttonAgreeAll:                   Agree on all
      close:                            Close

# ------------------------------------------------------------------------------
# END config