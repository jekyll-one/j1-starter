# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                J1 Test Daten
  scope:                                Default settings
  location:                             _data/defaults/tests.yml

# ------------------------------------------------------------------------------
# User configuration settings
#
defaults:

  # ----------------------------------------------------------------------------
  # GLOBAL settings
  #
  # enabled
  # ----------------------------------------------------------------------------
  #   Enables|Disables the use of a gallery
  #
  # ----------------------------------------------------------------------------
  #
  # enabled:                              false
  
  # ----------------------------------------------------------------------------
  # GLOBAL Default settings
  # ----------------------------------------------------------------------------
  #
  defaults:                             &app_defaults
    enabled:                            false
    controls:                           true

    settings:
      width:                            800
      height:                           600

    options:
      autoplay:                         false
      loop:                             true
      volume:                           1.0

  # ----------------------------------------------------------------------------
  # APP Default settings
  # ----------------------------------------------------------------------------
  #
  apps:

    - app:
      <<:                               *app_defaults

    - app:
      <<:                               *app_defaults
