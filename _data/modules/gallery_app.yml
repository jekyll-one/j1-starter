        options:
          licenseKey:                   0000-0000-000-0000
          download:                     false
          alignThumbnails:              left
          animateThumb:                 true
          autoplayFirstVideo:           true
          videojs:                      false

        videojsOptions:
          enabled:                      false

        playerParams:
          enabled:                      false
          autoplay:                     1
          byline:                       0
          portrait:                     0
          color:                        var(--md-gray-100)
          muted:                        0

      # ------------------------------------------------------------------------
      # CSS filter options
      #
      filters:
        enabled:                        false
        grayscale:                      0
        contrast:                       1
        brightness:                     1

      # ------------------------------------------------------------------------
      # Video settings
      # ------------------------------------------------------------------------
      #
      videos:

        - video:                        # video 1
          enabled:                      true

          name:                         Forever 21
          type:                         vimeo
          size:                         1280-720
          source:                       //vimeo.com/179528528
          poster_image:                 kick_it_old_school.jpg
          pinterest_prefix:             Pin video
          tweet_prefix:                 Try video
          caption_text:                 Forever 21 &middot; Kick It Old School
          description: >
                                        <h2>Forever 21</h2>
                                        <h3>Kick It Old School</h3>

          playerParams:
            start:                      50                                      # seconds to start

        - video:                        # video 2
          enabled:                      true

          name:                         Forever 21
          type:                         vimeo
          size:                         1280-720
          source:                       //vimeo.com/33929033
          poster_image:                 fall_2011.jpg
          pinterest_prefix:             Pin video
          tweet_prefix:                 Try video
          caption_text:                 Forever 21 &middot; Fall 2011
          description: >
                                        <h2>Forever 21</h2>
                                        <h3>Fall 2011</h3>

          playerParams:
            start:                      50                                      # seconds to start

