# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                J1 videoPlayer
  scope:                                User control settings
  location:                             _data/modules/videoPlayer_control.yml

# ------------------------------------------------------------------------------
# User control settings
#
settings:

  players:

    # --------------------------------------------------------------------------
    # Player 1 – Tiny Desk Concerts
    #
    - player:
      enabled:                          true

      # GENERAL options
      #   
      id:                               player_1
#     description:                      NPR Tiny Desk Concerts
      description:                      VideoJS Multi-Player 1

      # All videoJS settings below are per-instance overrides; missing keys
      # fall through to the top-level 'defaults' section.
      videoJS:
        autoStart:                      true

      toolbox:
        enabled:                        false

      playlist:

        # Playlists are merged into the instance's localStorage on page load.
        # Relative filenames are resolved against playlist_url_base.
        preload:                        []
#       preload:                        [ tinydesk-concerts.json ]

        cards:
          perRow:                       4

    # --------------------------------------------------------------------------
    # Player 2 – Tiny Desk Concerts
    #
    - player:
      enabled:                          true

      # GENERAL options
      #   
      id:                               player_2
#     description:                      Carpool Karaoke
      description:                      VideoJS Multi-Player 2

      videoJS:
        autoStart:                      true

      toolbox:
        enabled:                        false

      playlist:

        preload:                        []
#       preload:                        [ carpool-karaoke.json ]

        cards:
          perRow:                       3

    # --------------------------------------------------------------------------
    # Player 3 – Tiny Desk Concerts
    #
    - player:
      enabled:                          true

      # GENERAL options
      #   
      id:                               player_tiny_desk_concerts
      description:                      NPR Tiny Desk Concerts

      ui_elements:
        edit_playlist_button:           false

      videoJS:
        autoStart:                      true

        playbackRates:
          enabled:                      true
          values:                       [ 0.5, 1, 1.5, 2 ]

        # PLUGIN options
        # 
        plugins:

          playlist:
            enabled:                    true

      playlist:
        preload:                        [ tinydesk-concerts.json ]

        cards:
          perRow:                       4

# ------------------------------------------------------------------------------
# END config