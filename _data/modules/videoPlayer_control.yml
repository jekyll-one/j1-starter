# ------------------------------------------------------------------------------
# Description
#
description:
  title:                                J1 videoPlayer
  scope:                                User control settings
  location:                             _data/modules/videoPlayer_control.yml

# ------------------------------------------------------------------------------
# User control settings
#
settings:

  players:

    # --------------------------------------------------------------------------
    # Player 1
    #
    - player:

      # GENERAL settings
      #
      enabled:                          true      
      id:                               player_1
      description:                      VideoJS Multi-Player 1

    # --------------------------------------------------------------------------
    # Player 2
    #
    - player:

      # GENERAL settings
      #
      enabled:                          false
      id:                               player_2
      description:                      VideoJS Multi-Player 2

    # --------------------------------------------------------------------------
    # Player 3 – Tiny Desk Concerts
    #
    - player:

      # GENERAL settings
      #
      enabled:                          true
      id:                               player_tiny_desk_concerts
      description:                      NPR Tiny Desk Concerts

      # PLAYLIST settings
      #
      playlist:
        preload:                        [ tinydesk-concerts.json ]
        preload_attempts:               4

        cards:
          perRow:                       4

      # UI interface settings
      #
      ui_elements:
        edit_playlist_button:           false

        playlist_rate_button:           false
        playlist_edit_button:           false
        playlist_delete_button:         false

        mergeSwitch:                    false

      # VIDEOJS settings
      #
      videoJS:
        autoStart:                      true

        playbackRates:
          enabled:                      true
          values:                       [ 0.5, 1, 2 ]

        plugins:
          enabled:                      true

          playlist:
            enabled:                    true

# ------------------------------------------------------------------------------
# END config